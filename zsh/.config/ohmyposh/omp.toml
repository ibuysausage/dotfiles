console_title_template = '{{ .Shell }} in {{ .OS }} in {{ .PWD }}'
version = 4
final_space = true

[palette]
  black = '#121212'
  blue = '#4B95E9'
  green = '#59C9A5'
  orange = '#F07623'
  red = '#D81E5B'
  white = '#E0DEF4'
  yellow = '#F3AE35'
  navyblue = '#123456'
  magenta = '#bb9af7'
[upgrade]
 source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    background = 'transparent'
    foreground = 'p:magenta'
    template = "{{ .PWD }}"
